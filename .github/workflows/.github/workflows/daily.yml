name: Daily Dashboard Pipeline

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests gspread google-auth pytz

      - name: Run pipeline
        env:
          SHOPIFY_URL_CORO: ${{ secrets.SHOPIFY_URL_CORO }}
          SHOPIFY_TOKEN_CORO: ${{ secrets.SHOPIFY_TOKEN_CORO }}
          SHOPIFY_URL_CAVALLI: ${{ secrets.SHOPIFY_URL_CAVALLI }}
          SHOPIFY_TOKEN_CAVALLI: ${{ secrets.SHOPIFY_TOKEN_CAVALLI }}
          SHEET_ID_CORO: ${{ secrets.SHEET_ID_CORO }}
          SHEET_ID_CAVALLI: ${{ secrets.SHEET_ID_CAVALLI }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python pipeline.py
